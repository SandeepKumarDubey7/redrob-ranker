ai_usage_summary: |
  Used Claude for architecture discussion and code review.
  No candidate data was fed to any LLM during ranking.
  All ranking logic is deterministic rule-based + TF-IDF scoring.

methodology_summary: |
  Hybrid ranking system combining TF-IDF semantic search with multi-dimensional
  rule-based scoring. Seven scoring dimensions: title/role fit (22%), skill match
  (18%), career trajectory (15%), semantic similarity (15%), skill credibility (8%),
  experience band (8%), location (5%), education (3%), certifications (3%), and
  behavioral signals (3% additive + multiplicative modifier).

  Anti-trap design: title analysis catches keyword stuffers (Marketing Managers
  with AI skills); skill credibility cross-validates claims against career
  descriptions and duration/endorsement backing; 9-heuristic honeypot detector
  identifies impossible profiles. Behavioral modifier (0.4-1.35x) down-weights
  inactive/unresponsive candidates per JD guidance.

  Runtime: ~3 minutes for 100K candidates on CPU. Pure Python + numpy.

declarations:
  read_submission_spec: true
